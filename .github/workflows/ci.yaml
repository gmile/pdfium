name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main
      - stable

jobs:
  build-for-linux:
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        abi:
          - glibc
          - musl
        platform:
          - arm64
          - amd64

    steps:
      - uses: actions/checkout@v3

      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Precompile and test
        uses: dagger/dagger-for-github@v8.2.0
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          version: 0.15.1
          args: >-
            ci \
              --ref pull/${{ github.ref_name }} \
              --platform-name linux/${{ matrix.platform }} \
              --abi ${{ matrix.abi }} \
              --github-token GITHUB_TOKEN \
            export \
              --path . \
              --allowParentDirPath

      - name: Upload files
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.abi }}
          path: pdfium-nif-*

  build-for-macos:
    runs-on: macos-14
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout code
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        uses: actions/checkout@v4

      - name: Build
        run: |
          pushd custom
          ./build-for-mac.sh macos arm64 27.2
          ./build-for-mac.sh macos x86_64 27.2
          popd

      - name: Upload files
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        uses: actions/upload-artifact@v4
        with:
          name: macOS-builds
          path: custom/pdfium-nif-*
